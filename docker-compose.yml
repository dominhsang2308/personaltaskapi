version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: fastapi_api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/taskapi
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your_super_secret_key_here
    depends_on:
      - mongodb
      - redis

volumes:
  mongo_data:
